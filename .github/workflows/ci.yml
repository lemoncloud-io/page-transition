name: CI

on:
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'pnpm'

            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm typecheck
            - run: pnpm lint
            - run: pnpm test:run

            # Package validation for all publishable packages
            - name: Validate packages
              run: |
                  for pkg in packages/*/; do
                    echo "Validating $pkg"
                    pnpm dlx publint "$pkg"
                    pnpm dlx @arethetypeswrong/cli --pack "$pkg"
                  done
